<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhayrEats QA Guides</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; min-height: 100vh; }
    .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 1.25rem 1.5rem; }
    .header h1 { font-size: 18px; font-weight: 600; color: #111; }
    .header p { font-size: 13px; color: #666; margin-top: 3px; }
    .tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e5; padding: 0 1.5rem; }
    .tab { padding: 10px 16px; font-size: 14px; color: #666; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
    .tab.active { color: #111; border-bottom-color: #111; font-weight: 500; }
    .content { padding: 1.25rem 1.5rem; max-width: 680px; margin: 0 auto; }
    .overall-progress { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
    .overall-label { font-size: 13px; color: #666; margin-bottom: 4px; }
    .overall-count { font-size: 24px; font-weight: 600; color: #111; }
    .section { margin-bottom: 1.75rem; }
    .section-title { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.6rem; padding-bottom: 6px; border-bottom: 1px solid #e5e5e5; }
    .checklist { display: flex; flex-direction: column; gap: 2px; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 10px; border-radius: 8px; background: #fff; border: 1px solid #e5e5e5; cursor: pointer; transition: background 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
    .check-item:active { background: #f5f5f5; }
    .check-item.done { opacity: 0.5; }
    .check-item.done .check-label { text-decoration: line-through; color: #999; }
    .checkbox { width: 18px; height: 18px; min-width: 18px; border-radius: 4px; border: 1.5px solid #ccc; display: flex; align-items: center; justify-content: center; margin-top: 1px; transition: all 0.15s; flex-shrink: 0; }
    .check-item.done .checkbox { background: #555; border-color: #555; }
    .checkmark { display: none; }
    .check-item.done .checkmark { display: block; }
    .check-label { font-size: 14px; color: #111; line-height: 1.4; }
    .progress-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .progress-bar-wrap { background: #e5e5e5; border-radius: 4px; height: 4px; margin-top: 8px; overflow: hidden; }
    .progress-bar { height: 4px; background: #111; border-radius: 4px; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: #888; }
    .reset-btn { font-size: 12px; color: #bbb; cursor: pointer; }
    .reset-btn:hover { color: #888; }
    .version-badge { display: inline-block; font-size: 12px; color: #888; background: #f0f0f0; border: 1px solid #e0e0e0; border-radius: 5px; padding: 2px 8px; margin-bottom: 1rem; }
  </style>
</head>
<body>

  <h1>KhayrEats QA guides</h1>
  <p>Tap each item to mark as done. Progress saves in your browser.</p>
</div>

<div class="tabs">
  <div class="tab active" data-tab="customer" onclick="switchTab('customer', this)">Customer app</div>
  <div class="tab" data-tab="restaurant" onclick="switchTab('restaurant', this)">Restaurant app</div>
</div>

<div class="content" id="content-customer"></div>
<div class="content" id="content-restaurant" style="display:none"></div>

<svg style="display:none">
  <symbol id="check-icon" viewBox="0 0 10 10">
    <polyline points="1.5,5 4,7.5 8.5,2.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>
</svg>

const state = {
  customer: JSON.parse(localStorage.getItem('khayr-qa-customer') || '{}'),
  restaurant: JSON.parse(localStorage.getItem('khayr-qa-restaurant') || '{}')
};

function key(tab, si, ii) { return `${tab}-${si}-${ii}`; }
function save(tab) { localStorage.setItem(`khayr-qa-${tab}`, JSON.stringify(state[tab])); }

function buildGuide(tab) {
  const container = document.getElementById(`content-${tab}`);
  const guide = guides[tab];

  const badge = document.createElement('div');
  badge.className = 'version-badge';
  badge.style.marginTop = '1rem';
  badge.textContent = guide.version;
  container.appendChild(badge);

  const overall = document.createElement('div');
  overall.className = 'overall-progress';
  overall.innerHTML = `
    <div class="overall-label">Overall progress</div>
    <div class="overall-count" id="overall-count-${tab}">0 / 0</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="overall-bar-${tab}" style="width:0%"></div></div>
  `;
  container.appendChild(overall);

  guide.sections.forEach((section, si) => {
    const sec = document.createElement('div');
    sec.className = 'section';

    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = section.title;
    sec.appendChild(titleEl);

    const list = document.createElement('div');
    list.className = 'checklist';
    list.id = `${tab}-s${si}`;

    section.items.forEach((item, ii) => {
      const done = !!state[tab][key(tab, si, ii)];
      const div = document.createElement('div');
      div.className = 'check-item' + (done ? ' done' : '');
      div.id = `item-${tab}-${si}-${ii}`;
      div.innerHTML = `
        <div class="checkbox">
          <svg class="checkmark" width="10" height="10" viewBox="0 0 10 10">
            <use href="#check-icon"/>
          </svg>
        </div>
        <span class="check-label">${item}</span>
      `;
      div.addEventListener('click', () => toggle(tab, si, ii));
      list.appendChild(div);
    });

    sec.appendChild(list);

    const progBar = document.createElement('div');
    progBar.className = 'progress-bar-wrap';
    progBar.innerHTML = `<div class="progress-bar" id="${tab}-bar${si}" style="width:0%"></div>`;
    sec.appendChild(progBar);

    const progRow = document.createElement('div');
    progRow.className = 'progress-row';
    progRow.innerHTML = `
      <span class="progress-label" id="${tab}-prog${si}">0 / ${section.items.length}</span>
      <span class="reset-btn" onclick="resetSection('${tab}',${si})">reset</span>
    `;
    sec.appendChild(progRow);

    container.appendChild(sec);
    updateSection(tab, si);
  });

  updateOverall(tab);
}

function toggle(tab, si, ii) {
  const k = key(tab, si, ii);
  state[tab][k] = !state[tab][k];
  save(tab);
  document.getElementById(`item-${tab}-${si}-${ii}`).classList.toggle('done', !!state[tab][k]);
  updateSection(tab, si);
  updateOverall(tab);
}

function resetSection(tab, si) {
  guides[tab].sections[si].items.forEach((_, ii) => {
    delete state[tab][key(tab, si, ii)];
    document.getElementById(`item-${tab}-${si}-${ii}`).classList.remove('done');
  });
  save(tab);
  updateSection(tab, si);
  updateOverall(tab);
}

function updateSection(tab, si) {
  const items = guides[tab].sections[si].items;
  const done = items.filter((_, ii) => !!state[tab][key(tab, si, ii)]).length;
  const total = items.length;
  document.getElementById(`${tab}-prog${si}`).textContent = `${done} / ${total}`;
  document.getElementById(`${tab}-bar${si}`).style.width = `${Math.round(done / total * 100)}%`;
}

function updateOverall(tab) {
  let done = 0, total = 0;
  guides[tab].sections.forEach((section, si) => {
    section.items.forEach((_, ii) => {
      total++;
      if (state[tab][key(tab, si, ii)]) done++;
    });
  });
  document.getElementById(`overall-count-${tab}`).textContent = `${done} / ${total}`;
  document.getElementById(`overall-bar-${tab}`).style.width = `${Math.round(done / total * 100)}%`;
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content-customer').style.display = tab === 'customer' ? '' : 'none';
  document.getElementById('content-restaurant').style.display = tab === 'restaurant' ? '' : 'none';
}

buildGuide('customer');
